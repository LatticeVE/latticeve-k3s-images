name: build-images

on:
  workflow_dispatch:
    inputs:
      k3s_version:
        description: "k3s version (e.g. v1.36.2+k3s1)"
        required: true
        default: "v1.36.2+k3s1"
      alpine_version:
        description: "Alpine minirootfs version (e.g. 3.24.1)"
        required: true
        default: "3.24.1"
      kernel_version:
        description: "Guest kernel version (e.g. 6.1.174)"
        required: true
        default: "6.1.174"

jobs:
  rootfs:
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
            runner: ubuntu-latest
          - arch: aarch64
            goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Build k3s rootfs
        working-directory: rootfs
        env:
          K3S_VERSION: ${{ inputs.k3s_version }}
          ALPINE_VERSION: ${{ inputs.alpine_version }}
          ARCH: ${{ matrix.arch }}
        run: sudo -E WORK="$PWD" ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: k3s-rootfs-${{ matrix.goarch }}
          path: |
            rootfs/k3s-rootfs-${{ matrix.goarch }}.ext4
            rootfs/k3s-rootfs-${{ matrix.goarch }}.ext4.meta

  kernel:
    strategy:
      matrix:
        include:
          - arch: x86_64
            goarch: amd64
            runner: ubuntu-latest
          - arch: aarch64
            goarch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential bc flex bison libelf-dev libssl-dev
      - name: Build guest kernel
        working-directory: kernel
        env:
          KERNEL_VERSION: ${{ inputs.kernel_version }}
          ARCH: ${{ matrix.arch }}
        run: WORK="$PWD" ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: vmlinux-${{ matrix.goarch }}
          path: |
            kernel/vmlinux-${{ inputs.kernel_version }}-${{ matrix.goarch }}
            kernel/vmlinux-${{ inputs.kernel_version }}-${{ matrix.goarch }}.meta

  release:
    needs: [rootfs, kernel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Tag
        id: tag
        run: echo "tag=k3s-${{ inputs.k3s_version }}-kernel-${{ inputs.kernel_version }}-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*
